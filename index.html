// ── UTILS ──────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function getQuestions(themeId, count=15) {
  const pool = themeId==="all" ? BANK : BANK.filter(q=>q.t===themeId);
  return shuffle(pool).slice(0, Math.min(count, pool.length));
}

function getLevel(xp) {
  return [...LEVELS].reverse().find(l=>xp>=l.min)||LEVELS[0];
}

// ── SMALL COMPONENTS ───────────────────────────────────────────────────────
function XPBar({xp}) {
  const lvl=getLevel(xp);
  const next=LEVELS[LEVELS.indexOf(lvl)+1];
  const pct=next?Math.min(100,((xp-lvl.min)/(next.min-lvl.min))*100):100;
  return (
    <div style={{background:"#ffffff15",borderRadius:12,padding:"0.6rem 1rem"}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:"#fff",marginBottom:4,opacity:.8}}>
        <span>{lvl.emoji} {lvl.title}</span><span>{xp} XP</span>
      </div>
      <div style={{background:"#ffffff20",borderRadius:99,height:8}}>
        <div style={{background:"linear-gradient(90deg,#fbbf24,#f59e0b)",height:"100%",borderRadius:99,width:`${pct}%`,transition:"width .8s",boxShadow:"0 0 8px #fbbf2488"}}/>
      </div>
    </div>
  );
}

function Particle({x,y,icon,onDone}) {
  const [pos,setPos]=useState({x,y,op:1,sc:1});
  useEffect(()=>{
    const vy=-(Math.random()*3+2),vx=(Math.random()-.5)*4;
    let f=0;
    const id=setInterval(()=>{f++;setPos(p=>({x:p.x+vx,y:p.y+vy,op:Math.max(0,1-f/40),sc:Math.max(0,1-f/50)}));if(f>40){clearInterval(id);onDone();}},16);
    return()=>clearInterval(id);
  },[]);
  return <div style={{position:"fixed",left:pos.x,top:pos.y,fontSize:"1.2rem",opacity:pos.op,transform:`scale(${pos.sc})`,pointerEvents:"none",zIndex:9999}}>{icon}</div>;
}

function Toast({msg,type,onDone}) {
  useEffect(()=>{const t=setTimeout(onDone,2000);return()=>clearTimeout(t);},[]);
  const bg=type==="good"?"#10b981":type==="bad"?"#ef4444":"#6366f1";
  return <div style={{position:"fixed",top:80,left:"50%",transform:"translateX(-50%)",background:bg,color:"#fff",padding:".7rem 1.5rem",borderRadius:99,fontWeight:700,fontSize:".9rem",zIndex:9999,boxShadow:"0 8px 24px #0008",animation:"toastIn .3s ease",whiteSpace:"nowrap"}}>{msg}</div>;
}

      },1000);
    }
    return()=>clearInterval(timerRef.current);
  },[timerActive,confirmed]);

  const commitAnswer = useCallback((timeout=false)=>{
    if(confirmed)return;
    clearInterval(timerRef.current);
    setTimerActive(false);
    setConfirmed(true);

    setAllAns(prev=>{
      const q=questions[curQ];
      if(!q)return prev;
      const ua=timeout?[]:sel;
      const correct=q.a;
      const elapsed=(Date.now()-qStart)/1000;
      const isOk=ua.length>0&&correct.every(a=>ua.includes(a))&&ua.every(a=>correct.includes(a));
      const isSpeed=elapsed<5&&!timeout;

      if(isOk){
        setCombo(c=>{
          const nc=c+1; setMaxCombo(m=>Math.max(m,nc));
          const bonus=nc>=3?Math.floor(XP_OK*.5):0;
          const earned=XP_OK+bonus;
          setSessXP(s=>s+earned); setSessOk(s=>s+1);
          setUd(p=>{
            const nx={...p,xp:p.xp+earned,totalCorrect:p.totalCorrect+1,totalAnswered:p.totalAnswered+1};
            if(isSpeed)nx.hasSpeed=true;
            saveData(nx);
            checkBadges(nx);
            return nx;
          });
          if(nc>=3){spawn(["⭐","✨","💫","🔥"]);toast(`🔥 Combo x${nc}! +${bonus}XP bonus!`,"good");}
          else{spawn(["✅","⭐"]);toast(`+${earned} XP${isSpeed?" ⚡ Rapide!":""}`, "good");}
          return nc;
        });
      } else {
        setCombo(0);
        setUd(p=>{const nx={...p,totalAnswered:p.totalAnswered+1};saveData(nx);return nx;});
        if(timeout){spawn(["⏰"]);toast("⏰ Temps écoulé !","bad");}
        else if(ua.length>0){spawn(["❌"]);toast("Incorrect…","bad");}
        else toast("Sans réponse…","bad");
      }
      return [...prev,{q,ua,correct,status:isOk?"correct":ua.length===0?"skipped":"wrong"}];
    });
  },[confirmed,sel,questions,curQ,qStart,checkBadges]);

  const startQuiz = useCallback(themeId=>{
    setSelTheme(themeId);
    const qs=getQuestions(themeId,15);
    setQuestions(qs); setCurQ(0); setSel([]); setConfirmed(false);
    setTimeLeft(TIMER); setTimerActive(true);
    setSessXP(0); setSessOk(0); setCombo(0); setMaxCombo(0);
    setAllAns([]); setReviewMode(false); setQStart(Date.now());
    setScreen("quiz"); setShowThemes(false);
    const today=new Date().toDateString(), last=ud.lastPlayed;
    const yesterday=new Date(Date.now()-86400000).toDateString();
    if(last!==today){
      const ns=last===yesterday?ud.streak+1:1;
      save({lastPlayed:today,streak:ns,bestStreak:Math.max(ns,ud.bestStreak)});
      if(ns>1)toast(`🔥 Streak ${ns} jours !`,"good");
    }
  },[ud,save]);

  const handleNext = ()=>{
    if(curQ+1>=questions.length){ setScreen("result"); }
    else{ setCurQ(c=>c+1); setSel([]); setConfirmed(false); setTimeLeft(TIMER); setTimerActive(true); setQStart(Date.now()); }
  };

  const q=questions[curQ];
  const th=THEMES.find(t=>t.id===selTheme)||{color:"#6366f1",bg:"#1e1b4b",emoji:"🇪🇺",label:"Tous les thèmes"};
  const timerPct=(timeLeft/TIMER)*100;
  const timerColor=timeLeft>10?"#10b981":timeLeft>5?"#f59e0b":"#ef4444";
  const S={minHeight:"100vh",background:"#0f172a",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:"#fff"};

  // ── QUIZ ──
  if(screen==="quiz"&&q){
    const progress=(curQ/questions.length)*100;
    return (
      <div style={{...S,background:`linear-gradient(135deg,${th.bg},#0f172a)`}}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"1rem"}}>
          {/* Header */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".8rem"}}>
            <button onClick={()=>{clearInterval(timerRef.current);setScreen("home");}} style={{background:"#ffffff15",border:"none",color:"#fff",borderRadius:99,padding:".4rem .9rem",cursor:"pointer",fontSize:".85rem"}}>✕</button>
            <div style={{display:"flex",gap:".5rem",alignItems:"center"}}>
              {combo>=2&&<div style={{background:"#ef444422",border:"1px solid #ef4444",borderRadius:99,padding:".2rem .7rem",fontSize:".72rem",fontWeight:700,color:"#ef4444"}}>🔥 x{combo}</div>}
              <div style={{background:"#fbbf2422",border:"1px solid #fbbf24",borderRadius:99,padding:".2rem .7rem",fontSize:".72rem",fontWeight:700,color:"#fbbf24"}}>⭐ {sessXP} XP</div>
            </div>
            <div style={{fontSize:".82rem",color:"#94a3b8"}}>{curQ+1}/{questions.length}</div>
          </div>
          {/* Progress */}
          <div style={{background:"#ffffff15",borderRadius:99,height:6,marginBottom:".6rem"}}>
            <div style={{background:th.color,height:"100%",borderRadius:99,width:`${progress}%`,transition:"width .4s"}}/>
          </div>
          {/* Timer */}
          <div style={{background:"#ffffff10",borderRadius:99,height:8,marginBottom:".3rem",overflow:"hidden"}}>
            <div style={{background:timerColor,height:"100%",borderRadius:99,width:`${timerPct}%`,transition:"width 1s linear",boxShadow:`0 0 8px ${timerColor}88`}}/>
          </div>
          <div style={{textAlign:"center",fontSize:".72rem",color:timerColor,marginBottom:".8rem",fontWeight:700}}>⏱ {timeLeft}s</div>
          {/* Question */}
          <div style={{background:"#ffffff0d",borderRadius:20,padding:"1.2rem",marginBottom:".8rem",border:`1px solid ${th.color}44`}}>
            <div style={{display:"flex",gap:".5rem",marginBottom:".8rem",flexWrap:"wrap"}}>
              <span style={{fontSize:".65rem",background:th.color+"33",color:th.color,padding:".2rem .6rem",borderRadius:99,fontWeight:700}}>{th.emoji} {th.label}</span>
              {q.m&&<span style={{fontSize:".65rem",background:"#a855f733",color:"#c084fc",padding:".2rem .6rem",borderRadius:99,fontWeight:700}}>Plusieurs réponses</span>}
            </div>
            <div style={{fontSize:"1rem",fontWeight:700,lineHeight:1.55}}>{curQ+1}. {q.q}</div>
          </div>
          {/* Choices */}
          <div style={{display:"flex",flexDirection:"column",gap:".55rem",marginBottom:".8rem"}}>
            {q.c.map((c,ci)=>{
              let bg="#ffffff0d",bd=`1px solid #ffffff15`,cl="#e2e8f0",fw=500;
              if(confirmed){
                if(q.a.includes(ci)){bg="#10b98122";bd="2px solid #10b981";cl="#10b981";fw=700;}
                else if(sel.includes(ci)){bg="#ef444422";bd="2px solid #ef4444";cl="#ef4444";fw=700;}
              } else if(sel.includes(ci)){bg=`${th.color}33`;bd=`2px solid ${th.color}`;cl="#fff";fw=700;}
              return (
                <button key={ci} onClick={()=>{ if(confirmed)return; setSel(prev=>q.m?prev.includes(ci)?prev.filter(x=>x!==ci):[...prev,ci]:prev.includes(ci)?[]:[ci]); }}
                  style={{background:bg,border:bd,borderRadius:14,padding:".85rem 1rem",cursor:confirmed?"default":"pointer",textAlign:"left",color:cl,fontSize:".9rem",fontWeight:fw,display:"flex",alignItems:"center",gap:".8rem",transition:"all .2s",fontFamily:"inherit"}}>
                  <span style={{background:"#ffffff15",borderRadius:8,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",fontSize:".75rem",fontWeight:800,flexShrink:0}}>{String.fromCharCode(65+ci)}</span>
                  <span style={{lineHeight:1.4}}>{c}</span>
                  {confirmed&&q.a.includes(ci)&&<span style={{marginLeft:"auto"}}>✓</span>}
                  {confirmed&&sel.includes(ci)&&!q.a.includes(ci)&&<span style={{marginLeft:"auto"}}>✗</span>}
                </button>
              );
            })}
          </div>
          {/* Explication */}
          {confirmed&&<div style={{background:"#1e3a5f",borderRadius:14,padding:"1rem",marginBottom:".8rem",border:"1px solid #3b82f644",fontSize:".83rem",lineHeight:1.6,color:"#93c5fd"}}>💡 {q.e}</div>}
          {/* CTA */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:".5rem"}}>
            <div style={{display:"flex",gap:".3rem"}}>
              {["+0,2","−0,1","−0,05"].map((s,i)=><span key={i} style={{fontSize:".58rem",color:"#475569",background:"#0d1117",padding:".15rem .4rem",borderRadius:5,border:"1px solid #1e293b"}}>{["✅","❌","⬜"][i]} {s}</span>)}
            </div>
            {!confirmed
              ? <button onClick={()=>commitAnswer(false)} style={{background:sel.length>0?`linear-gradient(135deg,${th.color},${th.color}aa)`:"#ffffff15",border:"none",borderRadius:14,padding:".85rem 1.6rem",color:"#fff",fontWeight:800,fontSize:"1rem",cursor:"pointer",fontFamily:"inherit"}}>
                  {sel.length>0?"Valider ✓":"Passer →"}
                </button>
              : <button onClick={handleNext} style={{background:`linear-gradient(135deg,${th.color},${th.color}aa)`,border:"none",borderRadius:14,padding:".85rem 1.6rem",color:"#fff",fontWeight:800,fontSize:"1rem",cursor:"pointer",fontFamily:"inherit"}}>
                  {curQ+1>=questions.length?"Résultats 🏆":"Suivante →"}
                </button>
            }
          </div>
        </div>
        {particles.map(p=><Particle key={p.id} x={p.x} y={p.y} icon={p.icon} onDone={()=>setParticles(ps=>ps.filter(x=>x.id!==p.id))}/>)}
        {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onDone={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))}/>)}
      </div>
    );
  }

  // ── RESULT ──
  if(screen==="result"){
    const acc=allAns.length?Math.round((allAns.filter(a=>a.status==="correct").length/allAns.length)*100):0;
    return (
      <div style={S}>
        <div style={{maxWidth:480,margin:"0 auto",padding:"1.5rem"}}>
          {!reviewMode?(
            <>
              <div style={{textAlign:"center",marginBottom:"2rem"}}>
                <div style={{fontSize:"4rem",marginBottom:".5rem"}}>{acc>=80?"🏆":acc>=60?"🎯":"📚"}</div>
                <h2 style={{fontSize:"2rem",fontWeight:800,margin:0}}>Session terminée !</h2>
                <div style={{color:"#94a3b8",marginTop:".3rem"}}>{th.emoji} {selTheme==="all"?"Tous les thèmes":th.label}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".8rem",marginBottom:"1.5rem"}}>
                {[{l:"XP gagnés",v:`+${sessXP}`,e:"⭐",c:"#fbbf24"},{l:"Correctes",v:`${sessOk}/${questions.length}`,e:"✅",c:"#10b981"},{l:"Précision",v:`${acc}%`,e:"🎯",c:"#6366f1"},{l:"Combo max",v:`x${maxCombo}`,e:"🔥",c:"#ef4444"}].map(s=>(
                  <div key={s.l} style={{background:"#ffffff0d",borderRadius:16,padding:"1rem",textAlign:"center",border:"1px solid #ffffff10"}}>
                    <div style={{fontSize:"1.8rem"}}>{s.e}</div>
                    <div style={{fontSize:"1.5rem",fontWeight:800,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:".7rem",color:"#94a3b8"}}>{s.l}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"#ffffff0d",borderRadius:16,padding:"1rem",marginBottom:"1.5rem",border:"1px solid #ffffff10"}}>
                <XPBar xp={ud.xp}/>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:".7rem"}}>
                <button onClick={()=>setReviewMode(true)} style={{background:"#ffffff15",border:"none",borderRadius:16,padding:"1rem",color:"#fff",fontWeight:700,fontSize:".95rem",cursor:"pointer",fontFamily:"inherit"}}>📋 Revoir les réponses</button>
                <button onClick={()=>startQuiz(selTheme)} style={{background:`linear-gradient(135deg,${th.color},${th.color}aa)`,border:"none",borderRadius:16,padding:"1rem",color:"#fff",fontWeight:800,fontSize:"1rem",cursor:"pointer",fontFamily:"inherit"}}>🔄 Rejouer</button>
                <button onClick={()=>setScreen("home")} style={{background:"#ffffff0d",border:"none",borderRadius:16,padding:"1rem",color:"#94a3b8",fontWeight:700,fontSize:".95rem",cursor:"pointer",fontFamily:"inherit"}}>🏠 Accueil</button>
              </div>
            </>
          ):(
            <>
              <button onClick={()=>setReviewMode(false)} style={{background:"none",border:"none",color:"#818cf8",cursor:"pointer",marginBottom:"1.5rem",fontSize:".9rem",fontFamily:"inherit"}}>← Retour</button>
              <h2 style={{fontWeight:700,marginBottom:"1.5rem"}}>Correction détaillée</h2>
              {allAns.map((a,i)=>(
                <div key={i} style={{background:"#161b22",borderRadius:14,padding:"1.2rem",marginBottom:"1rem",borderLeft:`4px solid ${a.status==="correct"?"#10b981":a.status==="wrong"?"#ef4444":"#6b7280"}`}}>
                  <div style={{fontWeight:700,fontSize:".9rem",marginBottom:".8rem"}}>{i+1}. {a.q.q}</div>
                  {a.q.c.map((c,ci)=>(
                    <div key={ci} style={{padding:".35rem .7rem",borderRadius:8,marginBottom:".3rem",fontSize:".82rem",background:a.correct.includes(ci)?"#0d2b1d":a.ua.includes(ci)&&!a.correct.includes(ci)?"#2d1515":"#0d1117",color:a.correct.includes(ci)?"#10b981":a.ua.includes(ci)&&!a.correct.includes(ci)?"#ef4444":"#6b7280"}}>
                      {a.correct.includes(ci)?"✓":a.ua.includes(ci)?"✗":"  "} {String.fromCharCode(65+ci)}. {c}
                    </div>
                  ))}
                  <div style={{marginTop:".8rem",background:"#1c2d4a",borderRadius:8,padding:".7rem",fontSize:".8rem",color:"#93c5fd"}}>💡 {a.q.e}</div>
                </div>
              ))}
            </>
          )}
        </div>
        {particles.map(p=><Particle key={p.id} x={p.x} y={p.y} icon={p.icon} onDone={()=>setParticles(ps=>ps.filter(x=>x.id!==p.id))}/>)}
        {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onDone={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))}/>)}
      </div>
    );
  }

  // ── LEADERBOARD ──
  if(screen==="leaderboard") return (
    <div style={S}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:"1rem",marginBottom:"2rem"}}>
          <button onClick={()=>setScreen("home")} style={{background:"#ffffff15",border:"none",color:"#fff",borderRadius:99,padding:".5rem 1rem",cursor:"pointer",fontFamily:"inherit"}}>←</button>
          <h2 style={{margin:0}}>🏆 Classement</h2>
        </div>
        {[...ud.leaderboard,{name:"Mojtaba W.",xp:ud.xp,flag:"🇦🇫",isMe:true}].sort((a,b)=>b.xp-a.xp).map((p,i)=>(
          <div key={i} style={{background:p.isMe?"linear-gradient(135deg,#6366f1,#8b5cf6)":"#ffffff0d",border:p.isMe?"2px solid #6366f1":"1px solid #ffffff10",borderRadius:16,padding:"1rem 1.2rem",marginBottom:".7rem",display:"flex",alignItems:"center",gap:"1rem"}}>
            <div style={{fontSize:"1.4rem",width:36,textAlign:"center"}}>{i===0?"🥇":i===1?"🥈":i===2?"🥉":`#${i+1}`}</div>
            <div style={{fontSize:"1.6rem"}}>{p.flag}</div>
            <div style={{flex:1}}><div style={{fontWeight:700}}>{p.name}{p.isMe?" (toi)":""}</div><div style={{fontSize:".75rem",color:"#94a3b8"}}>{p.xp} XP</div></div>
            <div style={{fontSize:"1.3rem"}}>{getLevel(p.xp).emoji}</div>
          </div>
        ))}
      </div>
    </div>
  );

  // ── BADGES ──
  if(screen==="badges") return (
    <div style={S}>
      <div style={{maxWidth:480,margin:"0 auto",padding:"1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:"1rem",marginBottom:"2rem"}}>
          <button onClick={()=>setScreen("home")} style={{background:"#ffffff15",border:"none",color:"#fff",borderRadius:99,padding:".5rem 1rem",cursor:"pointer",fontFamily:"inherit"}}>←</button>
          <h2 style={{margin:0}}>🏅 Badges</h2>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".8rem"}}>
          {BADGES.map(b=>{
            const earned=ud.badges.includes(b.id);
            return (
              <div key={b.id} style={{background:earned?"linear-gradient(135deg,#1e3a5f,#1e1b4b)":"#ffffff08",border:`1px solid ${earned?"#3b82f6":"#ffffff10"}`,borderRadius:16,padding:"1rem",textAlign:"center",opacity:earned?1:.4}}>
                <div style={{fontSize:"2rem",marginBottom:".3rem"}}>{b.emoji}</div>
                <div style={{fontWeight:700,fontSize:".72rem"}}>{b.name}</div>
                <div style={{fontSize:".62rem",color:"#94a3b8",marginTop:".2rem"}}>{b.desc}</div>
                {earned&&<div style={{fontSize:".6rem",color:"#10b981",marginTop:".3rem"}}>✓ Obtenu</div>}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );

  // ── HOME ──
  return (
    <div style={{...S,background:"linear-gradient(160deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%)"}}>
      {particles.map(p=><Particle key={p.id} x={p.x} y={p.y} icon={p.icon} onDone={()=>setParticles(ps=>ps.filter(x=>x.id!==p.id))}/>)}
      {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onDone={()=>setToasts(ts=>ts.filter(x=>x.id!==t.id))}/>)}

      {/* Badge modal */}
      {badgeModal&&(
        <div style={{position:"fixed",inset:0,background:"#000a",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}} onClick={()=>setBadgeModal(null)}>
          <div style={{background:"linear-gradient(135deg,#1e1b4b,#1e3a5f)",border:"2px solid #6366f1",borderRadius:24,padding:"2.5rem",textAlign:"center",maxWidth:300,animation:"badgeIn .4s ease"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:"4rem",marginBottom:".5rem"}}>{badgeModal.emoji}</div>
            <div style={{fontWeight:800,fontSize:"1.3rem",color:"#fbbf24"}}>Nouveau badge !</div>
            <div style={{fontWeight:700,marginTop:".5rem"}}>{badgeModal.name}</div>
            <div style={{color:"#94a3b8",fontSize:".85rem",marginTop:".3rem"}}>{badgeModal.desc}</div>
            <button onClick={()=>setBadgeModal(null)} style={{marginTop:"1.5rem",background:"#6366f1",border:"none",borderRadius:99,padding:".7rem 2rem",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:".95rem",fontFamily:"inherit"}}>Super ! 🎉</button>
          </div>
        </div>
      )}

      <div style={{maxWidth:480,margin:"0 auto",padding:"1.5rem"}}>
        {/* Hero */}
        <div style={{textAlign:"center",marginBottom:"1.5rem",paddingTop:".5rem"}}>
          <div style={{fontSize:"3.5rem",marginBottom:".3rem"}}>🇪🇺</div>
          <h1 style={{fontSize:"2rem",fontWeight:900,margin:0,background:"linear-gradient(135deg,#6366f1,#a78bfa,#06b6d4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>EU with Mojtaba</h1>
          <p style={{color:"#94a3b8",fontSize:".78rem",margin:".3rem 0 0"}}>Révision SAEO 2026 · {BANK.length} questions · Gamifié</p>
        </div>

        {/* Stats */}
        <div style={{background:"linear-gradient(135deg,#1e1b4b,#1e3a5f)",borderRadius:20,padding:"1rem 1.2rem",marginBottom:"1.2rem",border:"1px solid #6366f122"}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:".8rem"}}>
            {[{v:ud.xp,l:"XP",c:"#fbbf24"},{v:`${ud.streak}🔥`,l:"Streak",c:"#ef4444"},{v:ud.totalCorrect,l:"Correctes",c:"#10b981"},{v:ud.badges.length,l:"Badges",c:"#a855f7"}].map(s=>(
              <div key={s.l} style={{textAlign:"center"}}>
                <div style={{fontSize:"1.3rem",fontWeight:800,color:s.c}}>{s.v}</div>
                <div style={{fontSize:".62rem",color:"#94a3b8"}}>{s.l}</div>
              </div>
            ))}
          </div>
          <XPBar xp={ud.xp}/>
        </div>

        {/* ⭐ BIG START BUTTON */}
        <button onClick={()=>startQuiz("all")} style={{
          width:"100%",background:"linear-gradient(135deg,#6366f1,#8b5cf6,#06b6d4)",
          border:"none",borderRadius:20,padding:"1.4rem",color:"#fff",
          fontWeight:900,fontSize:"1.35rem",cursor:"pointer",marginBottom:".8rem",
          animation:"glow 2s ease-in-out infinite",fontFamily:"inherit",letterSpacing:".02em",
          boxShadow:"0 8px 32px #6366f155"
        }}>
          🚀 JOUER — Mix tous les thèmes
        </button>

        {/* Toggle themes */}
        <button onClick={()=>setShowThemes(s=>!s)} style={{
          width:"100%",background:showThemes?"linear-gradient(135deg,#1e3a5f,#1e1b4b)":"#ffffff0d",
          border:`1px solid ${showThemes?"#3b82f6":"#ffffff15"}`,
          borderRadius:16,padding:".9rem",color:showThemes?"#93c5fd":"#94a3b8",
          fontWeight:700,fontSize:".95rem",cursor:"pointer",marginBottom:"1rem",
          fontFamily:"inherit",transition:"all .3s"
        }}>
          {showThemes?"▲ Masquer les thèmes":"🎯 Choisir un thème spécifique ▼"}
        </button>

        {/* Themes grid */}
        {showThemes&&(
          <>
            <div style={{fontSize:".68rem",color:"#94a3b8",textTransform:"uppercase",letterSpacing:".1em",marginBottom:".6rem"}}>📚 Programme classique</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",marginBottom:"1rem"}}>
              {THEMES.filter(t=>!t.actu).map((t,i)=>(
                <button key={t.id} onClick={()=>startQuiz(t.id)}
                  style={{background:`linear-gradient(135deg,${t.bg},#0f172a)`,border:`1px solid ${t.color}44`,borderRadius:16,padding:".9rem",cursor:"pointer",textAlign:"left",color:"#fff",fontFamily:"inherit",opacity:0,animation:`fadeUp .3s ${i*.04}s forwards`}}
                  onTouchStart={e=>e.currentTarget.style.transform="scale(.96)"}
                  onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
                  <div style={{fontSize:"1.3rem",marginBottom:".25rem"}}>{t.emoji}</div>
                  <div style={{fontWeight:700,fontSize:".78rem",lineHeight:1.3}}>{t.label}</div>
                  <div style={{fontSize:".58rem",color:t.color,marginTop:".2rem"}}>{BANK.filter(q=>q.t===t.id).length} questions</div>
                </button>
              ))}
            </div>
            <div style={{fontSize:".68rem",color:"#f87171",textTransform:"uppercase",letterSpacing:".1em",marginBottom:".6rem",display:"flex",alignItems:"center",gap:".5rem"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#ef4444",animation:"pulse 1s infinite"}}/>Actualité 2024-2025
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",marginBottom:"1rem"}}>
              {THEMES.filter(t=>t.actu).map((t,i)=>(
                <button key={t.id} onClick={()=>startQuiz(t.id)}
                  style={{background:`linear-gradient(135deg,${t.bg},#0f172a)`,border:`1px solid ${t.color}66`,borderRadius:16,padding:".9rem",cursor:"pointer",textAlign:"left",color:"#fff",position:"relative",fontFamily:"inherit",opacity:0,animation:`fadeUp .3s ${i*.04+.2}s forwards`}}
                  onTouchStart={e=>e.currentTarget.style.transform="scale(.96)"}
                  onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>
                  <div style={{position:"absolute",top:6,right:7,background:"#ef4444",borderRadius:5,padding:".1rem .35rem",fontSize:".5rem",fontWeight:800}}>2025</div>
                  <div style={{fontSize:"1.3rem",marginBottom:".25rem"}}>{t.emoji}</div>
                  <div style={{fontWeight:700,fontSize:".78rem",lineHeight:1.3}}>{t.label}</div>
                  <div style={{fontSize:".58rem",color:t.color,marginTop:".2rem"}}>{BANK.filter(q=>q.t===t.id).length} questions</div>
                </button>
              ))}
            </div>
          </>
        )}

        {/* Nav */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",marginBottom:"1.5rem"}}>
          <button onClick={()=>setScreen("leaderboard")} style={{background:"linear-gradient(135deg,#f59e0b22,#f59e0b11)",border:"1px solid #f59e0b44",borderRadius:14,padding:".8rem",color:"#fbbf24",fontWeight:700,cursor:"pointer",fontSize:".88rem",fontFamily:"inherit"}}>🏆 Classement</button>
          <button onClick={()=>setScreen("badges")} style={{background:"linear-gradient(135deg,#a855f722,#a855f711)",border:"1px solid #a855f744",borderRadius:14,padding:".8rem",color:"#c084fc",fontWeight:700,cursor:"pointer",fontSize:".88rem",fontFamily:"inherit"}}>🏅 Badges {ud.badges.length}/{BADGES.length}</button>
        </div>

        <div style={{textAlign:"center",color:"#334155",fontSize:".65rem",paddingBottom:"2rem"}}>
          EU with Mojtaba · SAEO 2026 · {BANK.length} questions intégrées
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
<script>
if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent)&&!window.MSStream;
if(isIOS&&!window.matchMedia('(display-mode: standalone)').matches){
  setTimeout(()=>{
    const d=document.createElement('div');
    d.innerHTML=`<div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;border:1px solid #6366f1;border-radius:16px;padding:1rem 1.5rem;z-index:10000;text-align:center;font-size:.82rem;width:90%;max-width:360px;box-shadow:0 8px 32px #0008;font-family:-apple-system,sans-serif">
      <div style="font-size:1.5rem;margin-bottom:.5rem">📱</div>
      <strong style="color:#a78bfa">Installer sur iPhone</strong><br/>
      Appuie sur <strong>⬆️ Partager</strong> puis<br/><strong>"Sur l'écran d'accueil"</strong><br/><br/>
      <button onclick="this.closest('div').parentElement.remove()" style="background:#6366f1;border:none;color:white;border-radius:99px;padding:.4rem 1.2rem;font-weight:700;cursor:pointer">OK</button>
    </div>`;
    document.body.appendChild(d);
  },4000);
}
</script>
</body>
</html>
